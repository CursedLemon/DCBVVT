<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>VolleyTrack Elite • Volleyball Analytics</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
      background: linear-gradient(135deg, #faf5ff 0%, #f3e8ff 100%);
      color: #1e1b4b;
      padding: 24px;
      min-height: 100vh;
      transition: all 0.2s ease;
    }
    body.dark-mode {
      background: linear-gradient(135deg, #0b0b15 0%, #130c1f 100%);
      color: #eef2ff;
    }
    body.dark-mode .app-header, body.dark-mode .stat-card, body.dark-mode .player-card,
    body.dark-mode .match-card, body.dark-mode .table-wrapper, body.dark-mode .chart-container,
    body.dark-mode .tabs, body.dark-mode .modal-content, body.dark-mode .practice-card,
    body.dark-mode .player-profile-header, body.dark-mode .physical-card, body.dark-mode .compare-results-card,
    body.dark-mode .empty-state, body.dark-mode .perf-block {
      background: #141424;
      border-color: #2a2a44;
      box-shadow: 0 12px 30px -8px rgba(0, 0, 0, 0.4);
    }
    body.dark-mode .stat-card .card-value { color: #c4b5fd; }
    body.dark-mode .stat-card .card-label { color: #a78bfa; }
    body.dark-mode .gradient-card { background: linear-gradient(145deg, #7c3aed, #a855f7); }
    body.dark-mode a, body.dark-mode td a { color: #e9d5ff !important; }
    body.dark-mode .nav-btn { background: #1e1e32; color: #c4b5fd; }
    body.dark-mode .nav-btn.active { background: linear-gradient(145deg, #8b5cf6, #a855f7); color: white; }
    body.dark-mode th { background: #1a1a2e; color: #c4b5fd; }
    body.dark-mode td { border-bottom-color: #2a2a44; }
    body.dark-mode input, body.dark-mode select, body.dark-mode textarea { background: #1e1e32; border-color: #3d3d60; color: #f1f5f9; }
    body.dark-mode .avatar-circle { background: linear-gradient(145deg, #a855f7, #7c3aed); }
    .container { max-width: 1500px; margin: 0 auto; }
    .app-header {
      display: flex; flex-wrap: wrap; align-items: center; justify-content: space-between;
      margin-bottom: 28px; background: rgba(255,255,255,0.96);
      padding: 18px 32px; border-radius: 28px;
      border: 1px solid rgba(108, 58, 237, 0.15);
    }
    .logo { font-weight: 800; font-size: 1.8rem; background: linear-gradient(135deg, #6c3aed, #a855f7); -webkit-background-clip: text; background-clip: text; color: transparent; cursor: pointer; }
    .logo::before { content: "🏐 "; background: none; -webkit-text-fill-color: initial; color: #6c3aed; }
    .nav-links { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; }
    .nav-btn { background: #f4f0fe; border: none; padding: 10px 20px; border-radius: 40px; font-weight: 600; color: #5b21b6; cursor: pointer; transition: all 0.2s; }
    .nav-btn.active { background: linear-gradient(145deg, #6c3aed, #8b5cf6); color: white; }
    .admin-toggle, .dark-mode-toggle, .json-btn {
      background: #f4f0fe; border: 1px solid #c4b5fd; padding: 10px 18px; border-radius: 40px;
      font-weight: 600; cursor: pointer; color: #5b21b6;
    }
    .json-btn.import { background: #d1fae5; border-color: #10b981; color: #065f46; }
    .json-btn.export { background: #fef3c7; border-color: #f59e0b; color: #92400e; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 22px; margin-bottom: 32px; }
    .stat-card { background: white; padding: 24px; border-radius: 28px; border: 1px solid #ede9fe; }
    .gradient-card { background: linear-gradient(145deg, #6c3aed, #8b5cf6); color: white; border: none; }
    .card-label { font-size: 0.8rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: #7e22ce; margin-bottom: 8px; }
    .card-value { font-size: 2.4rem; font-weight: 800; color: #4c1d95; }
    .gradient-card .card-label, .gradient-card .card-value { color: white; }
    .table-wrapper { overflow-x: auto; border-radius: 24px; background: white; padding: 4px; border: 1px solid #ede9fe; margin-bottom: 16px; }
    table { width: 100%; border-collapse: collapse; }
    th { text-align: left; padding: 14px 12px; background: #faf5ff; font-weight: 700; color: #6d28d9; }
    td { padding: 12px; border-bottom: 1px solid #f3e8ff; vertical-align: middle; }
    td a { color: #6d28d9; text-decoration: none; font-weight: 600; cursor: pointer; display: inline-block; }
    .player-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 24px; padding: 16px 0; }
    .player-card { background: white; border-radius: 28px; padding: 28px 20px; text-align: center; border: 1px solid #f0e6ff; cursor: pointer; transition: all 0.2s; position: relative; }
    .player-card:hover { transform: translateY(-4px); }
    .avatar-circle { width: 84px; height: 84px; background: linear-gradient(145deg, #8b5cf6, #6c3aed); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-weight: 800; font-size: 2rem; margin: 0 auto 16px; }
    .tabs { display: flex; gap: 8px; margin-bottom: 28px; background: #fff; padding: 8px 12px; border-radius: 60px; flex-wrap: wrap; }
    .tab-btn { padding: 10px 26px; border-radius: 40px; font-weight: 600; background: transparent; border: none; cursor: pointer; color: #6d28d9; }
    .tab-btn.active { background: linear-gradient(145deg, #6c3aed, #8b5cf6); color: white; }
    .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); justify-content: center; align-items: center; z-index: 2000; backdrop-filter: blur(4px); }
    .modal.active { display: flex; }
    .modal-content { background: white; border-radius: 32px; padding: 32px; max-width: 850px; width: 90%; max-height: 85vh; overflow-y: auto; }
    .modal-content input, .modal-content select, .modal-content textarea { padding: 12px 16px; margin: 8px 0 16px; border: 2px solid #e2e8f0; border-radius: 24px; width: 100%; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; margin-bottom: 16px; }
    button { background: linear-gradient(145deg, #6c3aed, #8b5cf6); color: white; border: none; padding: 10px 24px; border-radius: 40px; font-weight: 600; cursor: pointer; }
    button.danger { background: linear-gradient(145deg, #dc2626, #ef4444); }
    .match-card { background: white; border-radius: 28px; margin-bottom: 20px; overflow: hidden; border-left: 6px solid; transition: all 0.2s; }
    .match-card-header { padding: 22px 24px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; background: rgba(108,58,237,0.02); }
    .match-card-details { padding: 0 24px 24px; border-top: 1px solid #f3e8ff; }
    .badge { padding: 5px 14px; border-radius: 40px; font-size: 0.75rem; font-weight: 700; display: inline-block; }
    .win { background: #d1fae5; color: #065f46; }
    .loss { background: #fee2e2; color: #991b1b; }
    .mvp-badge { background: #fbbf24; color: #422006; padding: 4px 12px; border-radius: 40px; font-weight: 800; font-size: 0.75rem; display: inline-block; }
    .practice-card { background: white; border-radius: 24px; padding: 20px 24px; margin-bottom: 16px; border: 1px solid #ede9fe; transition: all 0.2s; }
    .practice-card:hover { transform: translateX(4px); }
    .perf-block { background: #faf5ff; border-radius: 20px; padding: 16px; margin-bottom: 12px; border: 1px solid #e2e8f0; }
    .stat-grid-inputs { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; margin-top: 12px; }
    .stat-input-item { display: flex; flex-direction: column; gap: 4px; }
    .stat-input-item label { font-size: 0.7rem; font-weight: 700; color: #7c3aed; text-transform: uppercase; }
    .stat-input-item input { padding: 8px; border-radius: 16px; text-align: center; margin: 0; }
    canvas { max-height: 300px; width: 100%; }
    .skill-tag { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 0.7rem; font-weight: 700; margin: 4px; }
    .skill-strength { background: #10b981; color: white; }
    .skill-weakness { background: #ef4444; color: white; }
    .skill-developing { background: #f59e0b; color: white; }
    .stats-row { display: flex; gap: 16px; flex-wrap: wrap; margin: 16px 0; }
    .stats-badge { background: #ede9fe; padding: 12px 16px; border-radius: 20px; text-align: center; flex: 1; min-width: 100px; }
    body.dark-mode .stats-badge { background: #1e1e36; }
    .compare-container { display: flex; flex-wrap: wrap; gap: 30px; margin-top: 20px; }
    .compare-radar { flex: 1; min-width: 300px; }
    .compare-stats { flex: 1; min-width: 300px; }
    .file-input { display: none; }
    .diff-positive { color: #10b981; font-weight: 700; }
    .diff-negative { color: #ef4444; font-weight: 700; }
    .diff-zero { color: #f59e0b; font-weight: 700; }
    .leaderboard-row { display: flex; align-items: center; padding: 12px; border-bottom: 1px solid #f3e8ff; }
    .leaderboard-name { width: 180px; font-weight: 600; }
    .leaderboard-bar-container { flex: 1; margin: 0 12px; }
    .leaderboard-bar { height: 32px; background: linear-gradient(90deg, #6c3aed, #a855f7); border-radius: 16px; display: flex; align-items: center; justify-content: flex-end; padding-right: 12px; color: white; font-weight: 600; font-size: 0.8rem; }
    .leaderboard-value { width: 80px; text-align: right; font-weight: 700; }
    body.dark-mode .leaderboard-row { border-bottom-color: #2a2a44; }
    .stat-badge-sm { background: #e9d5ff; padding: 4px 10px; border-radius: 20px; font-size: 0.7rem; font-weight: 600; display: inline-block; }
    .stat-selector { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 20px; align-items: center; }
    .stat-selector label { font-weight: 600; color: #7c3aed; }
    .stat-selector select { padding: 10px 20px; border-radius: 40px; border: 2px solid #e2e8f0; background: white; font-weight: 500; cursor: pointer; }
    body.dark-mode .stat-selector select { background: #1e1e32; border-color: #3d3d60; color: #e2e8f0; }
    .compare-table th, .compare-table td { text-align: left; padding: 12px 16px; }
    .compare-table td:first-child { font-weight: 600; }
    @media (max-width: 680px) { .app-header { flex-direction: column; } .stat-grid-inputs { grid-template-columns: repeat(2, 1fr); } .compare-container { flex-direction: column; } }
  </style>
</head>
<body>
<div class="container">
  <header class="app-header">
    <div class="logo" id="teamLogo">VolleyTrack</div>
    <div class="nav-links" id="navLinks">
      <button class="nav-btn active" data-page="dashboard">📊 Dashboard</button>
      <button class="nav-btn" data-page="players">👥 Players</button>
      <button class="nav-btn" data-page="matches">📅 Matches</button>
      <button class="nav-btn" data-page="practices">🏋️ Practices</button>
      <button class="nav-btn" data-page="compare">⚔️ Compare</button>
      <button class="nav-btn" data-page="analysis">🔍 Analysis</button>
      <button class="admin-toggle" id="adminToggle">🔒 Admin</button>
      <button class="dark-mode-toggle" id="darkModeToggle">🌙 Dark</button>
      <button class="json-btn import" id="importBtn">📂 Import JSON</button>
      <button class="json-btn export" id="exportBtn">💾 Export JSON</button>
    </div>
  </header>
  <div id="pageContent"></div>
</div>
<div class="modal" id="genericModal"><div class="modal-content" id="modalBody"></div></div>
<input type="file" id="fileInput" accept=".json" style="display:none;">

<script>
(function(){
  const defaultData = {
    teamName: 'VolleyTrack',
    players: [],
    matches: [],
    practices: [],
    playerRatings: {},
    playerPhysical: {},
    adminPassword: '67demon',
    darkMode: false
  };
  
  let appData = JSON.parse(JSON.stringify(defaultData));
  let isAdmin = false, currentPage = 'dashboard', currentPlayerId = null, currentPlayerTab = 'overview';
  let expandedMatches = new Set();
  let compareChart = null, ratingBarChart = null;
  let currentLeaderboardStat = 'kills';

  const ld = () => appData;
  const gp = (id) => ld().players.find(p => p.id === id);

  const calcPlayerStats = (pid) => {
    const matches = ld().matches;
    let stats = { kills:0, errors:0, attempts:0, assists:0, assistsAttempts:0, digs:0, digsAttempts:0, blocks:0, blockAttempts:0, played:0, mvpCount:0 };
    matches.forEach(m => {
      const perf = m.performances?.[pid];
      if (perf?.played) {
        stats.played++;
        stats.kills += perf.kills || 0;
        stats.errors += perf.errors || 0;
        stats.attempts += perf.attempts || 0;
        stats.assists += perf.assists || 0;
        stats.assistsAttempts += perf.assistsAttempts || 0;
        stats.digs += perf.digs || 0;
        stats.digsAttempts += perf.digsAttempts || 0;
        stats.blocks += perf.blocks || 0;
        stats.blockAttempts += perf.blockAttempts || 0;
      }
      if (m.mvp === pid) stats.mvpCount++;
    });
    stats.points = stats.kills + stats.blocks;
    stats.hittingPct = stats.attempts ? ((stats.kills - stats.errors)/stats.attempts * 100).toFixed(1) : 0;
    stats.setPct = stats.assistsAttempts ? (stats.assists / stats.assistsAttempts * 100).toFixed(1) : 0;
    stats.digPct = stats.digsAttempts ? (stats.digs / stats.digsAttempts * 100).toFixed(1) : 0;
    stats.blockPct = stats.blockAttempts ? (stats.blocks / stats.blockAttempts * 100).toFixed(1) : 0;
    return stats;
  };
  const getPlayerStats = (id) => calcPlayerStats(id);

  function renderRadarChart(pid, canvasId) {
    const canvas = document.getElementById(canvasId);
    if (!canvas) return;
    const ratings = ld().playerRatings[pid] || {};
    const data = ['serving','passing','hitting','blocking','defense','setting'].map(s => ratings[s] || 5);
    if (window[canvasId+'Chart']) window[canvasId+'Chart'].destroy();
    window[canvasId+'Chart'] = new Chart(canvas, { type: 'radar', data: { labels: ['Serving','Passing','Hitting','Blocking','Defense','Setting'], datasets: [{ label: gp(pid)?.name, data, backgroundColor: 'rgba(139,92,246,0.25)', borderColor: '#8b5cf6', pointBackgroundColor: '#6c3aed' }] }, options: { responsive: true, maintainAspectRatio: true, scales: { r: { max: 10, beginAtZero: true } } } });
  }

  function renderRatingBarChart(pid, canvasId) {
    const canvas = document.getElementById(canvasId);
    if (!canvas) return;
    const ratings = ld().playerRatings[pid] || {};
    const labels = ['Serving', 'Passing', 'Hitting', 'Blocking', 'Defense', 'Setting'];
    const values = ['serving','passing','hitting','blocking','defense','setting'].map(s => ratings[s] || 5);
    const backgroundColors = values.map(v => v >= 7 ? '#10b981' : (v < 5 ? '#ef4444' : '#f59e0b'));
    if (ratingBarChart) ratingBarChart.destroy();
    ratingBarChart = new Chart(canvas, { type: 'bar', data: { labels, datasets: [{ label: 'Skill Rating (1-10)', data: values, backgroundColor: backgroundColors, borderRadius: 8 }] }, options: { responsive: true, maintainAspectRatio: true, scales: { y: { max: 10, beginAtZero: true } } } });
  }

  function updateTeamNameDisplay() { document.getElementById('teamLogo').innerHTML = `🏐 ${ld().teamName}`; }

  window.exportToJSON = function() {
    const exportData = JSON.parse(JSON.stringify(ld()));
    delete exportData.adminPassword;
    const dataStr = JSON.stringify(exportData, null, 2);
    const blob = new Blob([dataStr], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `${ld().teamName.replace(/\s/g, '_')}_data.json`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  };

  window.importFromJSON = function(file) {
    const reader = new FileReader();
    reader.onload = function(e) {
      try {
        const importedData = JSON.parse(e.target.result);
        if (importedData.players && importedData.matches !== undefined) {
          appData = importedData;
          if (!appData.playerRatings) appData.playerRatings = {};
          if (!appData.playerPhysical) appData.playerPhysical = {};
          if (!appData.practices) appData.practices = [];
          if (!appData.teamName) appData.teamName = 'VolleyTrack';
          renderPage();
          alert('Data imported successfully!');
        } else {
          alert('Invalid JSON file: missing required fields');
        }
      } catch (err) {
        alert('Error parsing JSON file: ' + err.message);
      }
    };
    reader.readAsText(file);
  };

  function renderPage() {
    updateTeamNameDisplay();
    const content = document.getElementById('pageContent');
    if(currentPage === 'dashboard') renderDashboard(content);
    else if(currentPage === 'players') renderPlayers(content);
    else if(currentPage === 'matches') renderMatches(content);
    else if(currentPage === 'practices') renderPractices(content);
    else if(currentPage === 'compare') renderCompare(content);
    else if(currentPage === 'analysis') renderAnalysis(content);
    else if(currentPage.startsWith('player/')) renderPlayerProfile(content);
    else renderDashboard(content);
  }

  function renderDashboard(c) {
    const m = ld().matches, wins = m.filter(x=>x.result==='Win').length;
    const totalPoints = ld().players.reduce((sum,p)=> sum + getPlayerStats(p.id).points,0);
    c.innerHTML = `<div class="grid"><div class="stat-card"><div class="card-label">Matches</div><div class="card-value">${m.length}</div></div><div class="stat-card"><div class="card-label">W/L</div><div class="card-value">${wins}-${m.length-wins}</div></div><div class="stat-card gradient-card"><div class="card-label">Win Rate</div><div class="card-value">${m.length?Math.round(wins/m.length*100):0}%</div></div><div class="stat-card"><div class="card-label">Total Points</div><div class="card-value">${totalPoints}</div></div></div>
    <div class="stat-selector"><label>🏆 Leaderboard Statistic:</label><select id="leaderboardStatSelect">${getStatOptions()}</select></div>
    <div class="table-wrapper" id="leaderboardContainer">${generateLeaderboard(currentLeaderboardStat)}</div>`;
    const selectEl = document.getElementById('leaderboardStatSelect');
    if(selectEl) {
      selectEl.value = currentLeaderboardStat;
      selectEl.onchange = (e) => { currentLeaderboardStat = e.target.value; renderDashboard(c); };
    }
  }

  function getStatOptions() {
    return `<option value="kills">🏐 Kills</option><option value="assists">🎯 Assists</option><option value="digs">🛡️ Digs</option><option value="blocks">🧱 Blocks</option><option value="points">⭐ Points</option><option value="hittingPct">📊 Hitting %</option><option value="setPct">🎯 Set %</option><option value="digPct">🛡️ Dig %</option><option value="blockPct">🧱 Block %</option><option value="mvpCount">🏆 MVP Awards</option><option value="played">📈 Matches Played</option>`;
  }

  function generateLeaderboard(stat) {
    const players = ld().players.map(p => {
      const s = getPlayerStats(p.id);
      let value, suffix = '';
      if (stat === 'kills') { value = s.kills; suffix = ''; }
      else if (stat === 'assists') { value = s.assists; suffix = ''; }
      else if (stat === 'digs') { value = s.digs; suffix = ''; }
      else if (stat === 'blocks') { value = s.blocks; suffix = ''; }
      else if (stat === 'points') { value = s.points; suffix = ''; }
      else if (stat === 'hittingPct') { value = parseFloat(s.hittingPct); suffix = '%'; }
      else if (stat === 'setPct') { value = parseFloat(s.setPct); suffix = '%'; }
      else if (stat === 'digPct') { value = parseFloat(s.digPct); suffix = '%'; }
      else if (stat === 'blockPct') { value = parseFloat(s.blockPct); suffix = '%'; }
      else if (stat === 'mvpCount') { value = s.mvpCount; suffix = ''; }
      else { value = s.played; suffix = ''; }
      return { id: p.id, name: p.name, value: value, suffix: suffix };
    }).sort((a,b) => b.value - a.value).slice(0, 8);
    const maxVal = Math.max(...players.map(p => p.value), 1);
    return `<div style="padding:8px;">${players.map(p => `<div class="leaderboard-row"><div class="leaderboard-name"><a href="#" onclick="event.preventDefault();navigateTo('player/${p.id}')">${p.name}</a></div><div class="leaderboard-bar-container"><div class="leaderboard-bar" style="width: ${Math.max((p.value/maxVal)*100, 5)}%;">${p.value}${p.suffix}</div></div><div class="leaderboard-value">${p.value}${p.suffix}</div></div>`).join('')}</div>`;
  }

  function renderPlayers(c) {
    c.innerHTML = `<div style="display:flex;justify-content:space-between;margin-bottom:28px"><h2>👥 Roster</h2>${isAdmin?'<button onclick="openAddPlayerModal()">➕ Add Player</button>':''}</div><div class="player-grid">${ld().players.map(p=>{ const s=getPlayerStats(p.id); return `<div class="player-card" onclick="navigateTo('player/${p.id}')">${isAdmin?`<button class="delete-player-btn" style="position:absolute;top:12px;right:12px;background:#ef4444;color:white;border:none;width:32px;height:32px;border-radius:50%;cursor:pointer;" onclick="event.stopPropagation();deletePlayer('${p.id}')">✕</button>`:''}<div class="avatar-circle">${p.initials}</div><div style="font-weight:800">${p.name}</div><div style="color:#8b5cf6">#${p.number} • ${p.position}</div><div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px;"><div><small>H%</small><br><strong>${s.hittingPct}%</strong></div><div><small>S%</small><br><strong>${s.setPct}%</strong></div><div><small>D%</small><br><strong>${s.digPct}%</strong></div><div><small>B%</small><br><strong>${s.blockPct}%</strong></div></div></div>`}).join('')}</div>`;
  }

  function renderPlayerProfile(c) {
    const pid = currentPage.split('/')[1];
    if(!pid || !gp(pid)) { navigateTo('players'); return; }
    currentPlayerId = pid;
    const p = gp(pid), s = getPlayerStats(pid), phys = ld().playerPhysical[pid] || { height: 175, weight: 70, vertical: 50 };
    c.innerHTML = `<div style="margin-bottom:20px"><button onclick="navigateTo('players')">← Back</button></div>
      <div class="player-profile-header" style="display:flex;align-items:center;gap:24px;padding:28px;border-radius:32px;margin-bottom:24px;background:white;"><div class="avatar-circle" style="width:100px;height:100px;font-size:2.5rem">${p.initials}</div><div><h2>${p.name}</h2><div>#${p.number} • ${p.position}</div></div></div>
      <div class="tabs" id="playerTabs">
        <button class="tab-btn ${currentPlayerTab==='overview'?'active':''}" data-ptab="overview">📊 Overview</button>

  function renderPlayerTabContent() {

      container.innerHTML = `

          <div class="stats-badge"><strong>🧱 Blocks</strong><br><span style="font-size:1.5rem;font-weight:800;">${s.blocks}</span></div>
          <div class="stats-badge"><strong>🎯 Assists</strong><br><span style="font-size:1.5rem;font-weight:800;">${s.assists}</span></div>
          <div class="stats-badge"><strong>🛡️ Digs</strong><br><span style="font-size:1.5rem;font-weight:800;">${s.digs}</span></div>
        </div>
        <div class="stats-row">
          <div class="stats-badge"><strong>📊 Hitting %</strong><br><span style="font-size:1.2rem;">${s.hittingPct}%</span><br><small>${s.kills}/${s.attempts}</small></div>
          <div class="stats-badge"><strong>🎯 Set %</strong><br><span style="font-size:1.2rem;">${s.setPct}%</span><br><small>${s.assists}/${s.assistsAttempts}</small></div>
          <div class="stats-badge"><strong>🛡️ Dig %</strong><br><span style="font-size:1.2rem;">${s.digPct}%</span><br><small>${s.digs}/${s.digsAttempts}</small></div>
          <div class="stats-badge"><strong>🧱 Block %</strong><br><span style="font-size:1.2rem;">${s.blockPct}%</span><br><small>${s.blocks}/${s.blockAttempts}</small></div>
          <div class="stats-badge"><strong>🏆 MVP</strong><br><span style="font-size:1.5rem;font-weight:800;">${s.mvpCount}</span></div>
        </div>
        <div class="physical-stats-grid" style="display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:16px;margin:20px 0;">
          <div class="physical-card"><strong>📏 Height</strong><br>${isAdmin?`<input type="number" value="${phys.height}" onchange="updatePhysical('${pid}','height',this.value)" style="width:80px;padding:6px;border-radius:20px;">`:phys.height} cm</div>
          <div class="physical-card"><strong>⚖️ Weight</strong><br>${isAdmin?`<input type="number" value="${phys.weight}" onchange="updatePhysical('${pid}','weight',this.value)" style="width:80px;padding:6px;border-radius:20px;">`:phys.weight} kg</div>
          <div class="physical-card"><strong>📈 Vertical</strong><br>${isAdmin?`<input type="number" value="${phys.vertical}" onchange="updatePhysical('${pid}','vertical',this.value)" style="width:80px;padding:6px;border-radius:20px;">`:phys.vertical} cm</div>
        </div>
        <div class="chart-container"><canvas id="overviewRadarCanvas"></canvas></div>
        <div style="margin-top:16px;"><strong>🎯 Skill Analysis:</strong><br>${strengths.length? strengths.map(s=>`<span class="skill-tag skill-strength">💪 ${s}</span>`).join('') : ''}${developing.length? developing.map(s=>`<span class="skill-tag skill-developing">📊 ${s}</span>`).join('') : ''}${weaknesses.length? weaknesses.map(s=>`<span class="skill-tag skill-weakness">🎯 ${s}</span>`).join('') : ''}</div>`;
      setTimeout(()=>renderRadarChart(pid,'overviewRadarCanvas'),50);
    } 
    else if(currentPlayerTab === 'rating') {
      container.innerHTML = `<div class="chart-container"><canvas id="ratingBarCanvas" style="height:300px"></canvas></div>
        <div style="margin-top:24px;"><h4>Edit Ratings ${isAdmin ? '(Click to modify)' : ''}</h4>
        ${['serving','passing','hitting','blocking','defense','setting'].map(skill => {
          const val = ratings[skill] || 5;
          const color = val >= 7 ? '#10b981' : (val < 5 ? '#ef4444' : '#f59e0b');
          return `<div style="display:flex;justify-content:space-between;align-items:center;margin:12px 0;padding:10px;background:${color}20;border-radius:16px;border-left:4px solid ${color};">
            <strong style="text-transform:capitalize;">${skill}</strong>
            ${isAdmin ? `<input type="number" step="0.5" min="0" max="10" value="${val}" onchange="updateRating('${pid}','${skill}',this.value)" style="width:80px;padding:8px;border-radius:20px;text-align:center;">` : `<span style="font-size:1.2rem;font-weight:700;color:${color};">${val.toFixed(1)}/10</span>`}
          </div>`;
        }).join('')}</div>`;
      setTimeout(()=>renderRatingBarChart(pid,'ratingBarCanvas'),50);
    }
    else if(currentPlayerTab === 'matchlog') {
      const matchesPlayed = ld().matches.filter(m => m.performances?.[pid]?.played);
      if(!matchesPlayed.length) { 
        container.innerHTML = '<div class="empty-state">No matches played yet.</div>'; 
        return; 
      }
      container.innerHTML = `<div class="table-wrapper">
        <table style="width:100%">
          <thead>
            <tr>
              <th>Date</th>
              <th>Opponent</th>
              <th>Result</th>
              <th>K</th>
              <th>E</th>
              <th>TA</th>
              <th>H%</th>
              <th>A</th>
              <th>S%</th>
              <th>D</th>
              <th>D%</th>
              <th>B</th>
              <th>B%</th>
            </tr>
          </thead>
          <tbody>
            ${matchesPlayed.map(m => {
              const pf = m.performances[pid];
              const hp = pf?.attempts ? ((pf.kills - pf.errors) / pf.attempts * 100).toFixed(1) : 0;
              const sp = pf?.assistsAttempts ? (pf.assists / pf.assistsAttempts * 100).toFixed(1) : 0;
              const dp = pf?.digsAttempts ? (pf.digs / pf.digsAttempts * 100).toFixed(1) : 0;
              const bp = pf?.blockAttempts ? (pf.blocks / pf.blockAttempts * 100).toFixed(1) : 0;
              return `<tr>
                <td>${m.date}</td>

                <td>${pf?.errors || 0}</td>
                <td>${pf?.attempts || 0}</td>
                <td><span class="stat-badge-sm">${hp}%</span></td>
                <td>${pf?.assists || 0}</td>
                <td><span class="stat-badge-sm">${sp}%</span></td>
                <td>${pf?.digs || 0}</td>
                <td><span class="stat-badge-sm">${dp}%</span></td>
                <td>${pf?.blocks || 0}</td>
                <td><span class="stat-badge-sm">${bp}%</span></td>
              </tr>`;
            }).join('')}
          </tbody>
        </table>
      </div>`;
    }
  }

  function renderMatches(c) {
    c.innerHTML = `<div style="display:flex;justify-content:space-between;margin-bottom:24px;"><h2>📅 Matches</h2>${isAdmin?'<button onclick="openAddMatchModal()">➕ Add Match</button>':''}</div>`;
    if(ld().matches.length===0) { c.innerHTML += `<div class="empty-state">No matches yet.</div>`; return; }
    c.innerHTML += ld().matches.map(m => `<div class="match-card" style="border-left-color:${m.result==='Win'?'#10b981':'#ef4444'}">
      <div class="match-card-header" onclick="toggleMatchExpansion('${m.id}')">
        <div><strong>📆 ${m.date}</strong> vs <strong>${m.opponent || 'TBD'}</strong> <span class="badge ${m.result==='Win'?'win':'loss'}">${m.result}</span>${m.mvp?` <span class="mvp-badge">🏆 ${gp(m.mvp)?.name}</span>`:''}${isAdmin?` <button class="small" style="padding:4px 12px;font-size:0.75rem;" onclick="event.stopPropagation();setMVPModal('${m.id}')">⭐ MVP</button>`:''}</div>
        <div><span style="font-weight:700;">${m.score||'3-0'}</span> <span>${expandedMatches.has(m.id)?'▲':'▼'}</span></div>
      </div>
      ${expandedMatches.has(m.id)?`<div class="match-card-details"><div class="table-wrapper">${generateMatchStatsTable(m)}</div>${isAdmin?`<div style="margin-top:16px;"><button class="danger" onclick="deleteMatch('${m.id}')">🗑️ Delete Match</button></div>`:''}</div>`:''}
    </div>`).join('');
  }

  function generateMatchStatsTable(m) { return `<table><thead><tr><th>Player</th><th>K</th><th>E</th><th>TA</th><th>H%</th><th>A</th><th>A%</th><th>D</th><th>D%</th><th>B</th><th>B%</th></tr></thead><tbody>${ld().players.map(p=>{ const pf=m.performances?.[p.id]; if(!pf?.played) return ''; const hp = pf.attempts ? ((pf.kills-pf.errors)/pf.attempts*100).toFixed(1):0; const sp = pf.assistsAttempts ? (pf.assists/pf.assistsAttempts*100).toFixed(1):0; const dp = pf.digsAttempts ? (pf.digs/pf.digsAttempts*100).toFixed(1):0; const bp = pf.blockAttempts ? (pf.blocks/pf.blockAttempts*100).toFixed(1):0; return `<tr><td style="font-weight:600;">${p.name}${m.mvp===p.id?' 🏆':''}</td><td>${pf.kills||0}</td><td>${pf.errors||0}</td><td>${pf.attempts||0}</td><td><span class="stat-badge-sm">${hp}%</span></td><td>${pf.assists||0}</td><td><span class="stat-badge-sm">${sp}%</span></td><td>${pf.digs||0}</td><td><span class="stat-badge-sm">${dp}%</span></td><td>${pf.blocks||0}</td><td><span class="stat-badge-sm">${bp}%</span></td></tr>`; }).join('')}</tbody></tr>`; }

  function renderPractices(c) {
    c.innerHTML = `<div style="display:flex;justify-content:space-between;margin-bottom:24px;"><h2>🏋️ Training Sessions</h2>${isAdmin?'<button onclick="openAddPracticeModal()">➕ Add Practice</button>':''}</div>`;
    if(ld().practices.length===0) { c.innerHTML += `<div class="empty-state">No practices recorded yet.</div>`; return; }
    c.innerHTML += `<div class="practice-grid">${ld().practices.map(p => `<div class="practice-card"><div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;"><div><span style="font-size:1.1rem;font-weight:700;">📅 ${p.date}</span> • <span class="badge" style="background:#e9d5ff;color:#5b21b6;">🎯 ${p.focus || 'General Training'}</span> • ⏱️ ${p.duration || 60} minutes</div>${isAdmin?`<button class="practice-delete-btn" style="background:#ef4444;color:white;border:none;width:32px;height:32px;border-radius:50%;cursor:pointer;" onclick="deletePractice('${p.id}')">✕</button>`:''}</div><details style="margin-top:12px;"><summary style="cursor:pointer;font-weight:600;color:#8b5cf6;">📋 Attendance (${Object.values(p.attendance||{}).filter(a=>a?.present).length}/${ld().players.length})</summary><div style="margin-top:12px;">${ld().players.map(pl=>{ const a=p.attendance?.[pl.id]; return `<div class="attendance-row" style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #f3e8ff;"><span style="font-weight:500;">${pl.name}</span><span>${a?.present?'✅ Present':'❌ Absent'}</span><span>${a?.rating?'⭐'.repeat(a.rating):'-'}</span></div>`; }).join('')}</div></details></div>`).join('')}</div>`;
  }

  function renderCompare(c) {
    if(ld().players.length < 2) { c.innerHTML = `<div class="empty-state">Need at least 2 players to compare</div>`; return; }
    c.innerHTML = `<h2>⚔️ Player Comparison</h2>
      <div style="display:flex;gap:20px;margin:20px 0;flex-wrap:wrap;">
        <select id="cp1" style="flex:1; min-width:180px; padding:12px; border-radius:40px;">${ld().players.map(p => `<option value="${p.id}">${p.name}</option>`).join('')}</select>
        <select id="cp2" style="flex:1; min-width:180px; padding:12px; border-radius:40px;">${ld().players.map((p,i) => `<option value="${p.id}" ${i===1 ? 'selected' : ''}>${p.name}</option>`).join('')}</select>
        <button onclick="updateCompare()">Compare Players</button>
      </div>
      <div class="compare-container">
        <div class="compare-radar"><canvas id="compareRadarCanvas" style="height:350px;"></canvas></div>
        <div class="compare-stats" id="compareStatsTable"></div>
      </div>`;
    setTimeout(() => updateCompare(), 100);
  }

  window.updateCompare = function() {
    const p1Id = document.getElementById('cp1')?.value;
    const p2Id = document.getElementById('cp2')?.value;
    if(!p1Id || !p2Id) return;
    const p1 = gp(p1Id), p2 = gp(p2Id);
    const s1 = getPlayerStats(p1Id), s2 = getPlayerStats(p2Id);
    const r1 = ld().playerRatings[p1Id] || {}, r2 = ld().playerRatings[p2Id] || {};
    const canvas = document.getElementById('compareRadarCanvas');
    if(canvas) {
      const data1 = ['serving','passing','hitting','blocking','defense','setting'].map(s => r1[s] || 5);
      const data2 = ['serving','passing','hitting','blocking','defense','setting'].map(s => r2[s] || 5);
      if(compareChart) compareChart.destroy();
      compareChart = new Chart(canvas, { type: 'radar', data: { labels: ['Serving','Passing','Hitting','Blocking','Defense','Setting'], datasets: [{ label: p1.name, data: data1, backgroundColor: 'rgba(99,102,241,0.2)', borderColor: '#6366f1' }, { label: p2.name, data: data2, backgroundColor: 'rgba(236,72,153,0.2)', borderColor: '#ec4899' }] }, options: { responsive: true, maintainAspectRatio: true, scales: { r: { max: 10, beginAtZero: true } } } });
    }
    const getDiffClass = (a, b) => { if(a > b) return 'diff-positive'; if(a < b) return 'diff-negative'; return 'diff-zero'; };
    const getDiffSymbol = (a, b) => { if(a > b) return `+${(a-b).toFixed(1)}`; if(a < b) return `${(a-b).toFixed(1)}`; return '0'; };
    document.getElementById('compareStatsTable').innerHTML = `
      <div class="table-wrapper">
        <table class="compare-table" style="width:100%; border-collapse: collapse;">
          <thead><tr style="background: #faf5ff;"><th style="padding: 14px 16px;">Statistic</th><th style="padding: 14px 16px;">${p1.name}</th><th style="padding: 14px 16px;">${p2.name}</th><th style="padding: 14px 16px;">Difference</th></tr></thead>
          <tbody>
            ${[['🏐 Kills', s1.kills, s2.kills], ['🧱 Blocks', s1.blocks, s2.blocks], ['🎯 Assists', s1.assists, s2.assists], ['🛡️ Digs', s1.digs, s2.digs], ['⭐ Points', s1.points, s2.points]].map(row => `<tr><td style="padding: 12px 16px; font-weight: 600;">${row[0]}</td><td style="padding: 12px 16px;">${row[1]}</td><td style="padding: 12px 16px;">${row[2]}</td><td style="padding: 12px 16px;" class="${getDiffClass(row[1], row[2])}">${getDiffSymbol(row[1], row[2])}</td></tr>`).join('')}
            ${[['📊 Hitting %', parseFloat(s1.hittingPct), parseFloat(s2.hittingPct)], ['🎯 Set %', parseFloat(s1.setPct), parseFloat(s2.setPct)], ['🛡️ Dig %', parseFloat(s1.digPct), parseFloat(s2.digPct)], ['🧱 Block %', parseFloat(s1.blockPct), parseFloat(s2.blockPct)]].map(row => `<tr><td style="padding: 12px 16px; font-weight: 600;">${row[0]}</td><td style="padding: 12px 16px;">${row[1]}%</td><td style="padding: 12px 16px;">${row[2]}%</td><td style="padding: 12px 16px;" class="${getDiffClass(row[1], row[2])}">${getDiffSymbol(row[1], row[2])}%</td></tr>`).join('')}
            <tr><td style="padding: 12px 16px; font-weight: 600;">🏆 MVP Awards</td><td style="padding: 12px 16px;">${s1.mvpCount}</td><td style="padding: 12px 16px;">${s2.mvpCount}</td><td style="padding: 12px 16px;" class="${getDiffClass(s1.mvpCount, s2.mvpCount)}">${getDiffSymbol(s1.mvpCount, s2.mvpCount)}</td></tr>
            <tr><td style="padding: 12px 16px; font-weight: 600;">📈 Matches Played</td><td style="padding: 12px 16px;">${s1.played}</td><td style="padding: 12px 16px;">${s2.played}</td><td style="padding: 12px 16px;" class="${getDiffClass(s1.played, s2.played)}">${getDiffSymbol(s1.played, s2.played)}</td></tr>
          </tbody>
        </table>
      </div>`;
  };

  function renderAnalysis(c) { c.innerHTML = `<h2>🔍 Performance Analysis</h2><div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:24px;">${ld().players.map(p=>{ const s=getPlayerStats(p.id); return `<div class="stat-card"><h3>${p.name}</h3><div>🎯 Hitting: ${s.hittingPct}%</div><div>🏐 Set: ${s.setPct}%</div><div>🛡️ Dig: ${s.digPct}%</div><div>🧱 Block: ${s.blockPct}%</div><canvas id="mini_${p.id}" style="height:150px"></canvas></div>`}).join('')}</div>`; setTimeout(()=>{ ld().players.forEach(p=>renderRadarChart(p.id,`mini_${p.id}`)); },100); }

  window.updatePhysical = (pid, field, val) => { if(!isAdmin) return; if(!ld().playerPhysical[pid]) ld().playerPhysical[pid]={}; ld().playerPhysical[pid][field]=parseInt(val); renderPage(); };
  window.updateRating = (pid, skill, val) => { if(!isAdmin) return; let num=parseFloat(val); if(isNaN(num)) num=5; num=Math.min(10,Math.max(0,num)); if(!ld().playerRatings[pid]) ld().playerRatings[pid]={}; ld().playerRatings[pid][skill]=num; renderPage(); };
  
  window.openAddMatchModal = function() { if(!isAdmin) return; openModal(`<h3>➕ Add Match</h3><div class="form-row"><div><label>Date</label><input id="mDate" type="date" value="${new Date().toISOString().slice(0,10)}"></div><div><label>Opponent</label><input id="mOpp"></div></div><div class="form-row"><div><label>Result</label><select id="mRes"><option>Win</option><option>Loss</option></select></div><div><label>Score</label><input id="mScore" placeholder="3-1"></div></div><h4>📊 Player Stats</h4>${ld().players.map(p => `<div class="perf-block"><label style="font-weight:700;">${p.name} (#${p.number})</label><div class="stat-grid-inputs"><div class="stat-input-item"><label>KILLS</label><input type="number" id="k_${p.id}" value="0"></div><div class="stat-input-item"><label>ERRORS</label><input type="number" id="e_${p.id}" value="0"></div><div class="stat-input-item"><label>ATTEMPTS</label><input type="number" id="att_${p.id}" value="0"></div><div class="stat-input-item"><label>SETS</label><input type="number" id="a_${p.id}" value="0"></div><div class="stat-input-item"><label>SET ATT</label><input type="number" id="sa_${p.id}" value="0"></div><div class="stat-input-item"><label>DIGS</label><input type="number" id="d_${p.id}" value="0"></div><div class="stat-input-item"><label>DIG ATT</label><input type="number" id="da_${p.id}" value="0"></div><div class="stat-input-item"><label>BLOCKS</label><input type="number" id="b_${p.id}" value="0"></div><div class="stat-input-item"><label>BLOCK ATT</label><input type="number" id="ba_${p.id}" value="0"></div></div></div>`).join('')}<div style="margin-top:20px;display:flex;gap:12px;"><button class="danger" onclick="closeModal()">Cancel</button><button onclick="commitMatch()">Save Match</button></div>`); };
  window.commitMatch = function() { const perfs = {}; ld().players.forEach(p => { perfs[p.id] = { played:true, kills:parseInt(document.getElementById(`k_${p.id}`)?.value||0), errors:parseInt(document.getElementById(`e_${p.id}`)?.value||0), attempts:parseInt(document.getElementById(`att_${p.id}`)?.value||0), assists:parseInt(document.getElementById(`a_${p.id}`)?.value||0), assistsAttempts:parseInt(document.getElementById(`sa_${p.id}`)?.value||0), digs:parseInt(document.getElementById(`d_${p.id}`)?.value||0), digsAttempts:parseInt(document.getElementById(`da_${p.id}`)?.value||0), blocks:parseInt(document.getElementById(`b_${p.id}`)?.value||0), blockAttempts:parseInt(document.getElementById(`ba_${p.id}`)?.value||0) }; }); ld().matches.push({ id:'m'+Date.now(), date:document.getElementById('mDate').value, opponent:document.getElementById('mOpp').value, result:document.getElementById('mRes').value, score:document.getElementById('mScore').value, notes:'', mvp:null, performances:perfs }); renderPage(); closeModal(); };
  window.openAddPracticeModal = function() { if(!isAdmin) return; openModal(`<h3>🏋️ Add Practice Session</h3><div class="form-row"><div><label>Date</label><input id="prDate" type="date" value="${new Date().toISOString().slice(0,10)}"></div><div><label>Duration (minutes)</label><input id="prDur" type="number" placeholder="90"></div></div><div class="form-group"><label>Focus / Theme</label><input id="prFocus" placeholder="e.g., Serving, Defense, Hitting"></div><textarea id="prNotes" placeholder="Notes (optional)" rows="2" style="width:100%; padding:12px; border-radius:20px; border:2px solid #e2e8f0;"></textarea><h4 style="margin-top:16px;">📋 Attendance & Performance Rating</h4>${ld().players.map(p => `<div style="display:flex;align-items:center;gap:12px;margin:10px 0;padding:8px;background:#faf5ff;border-radius:16px;"><label style="flex:2;"><input type="checkbox" class="aPresCheck" data-pid="${p.id}" checked> ${p.name} (#${p.number})</label><select class="aRatingSelect" data-pid="${p.id}" style="padding:8px;border-radius:20px;">${[1,2,3,4,5].map(r=>`<option>${r}⭐</option>`).join('')}</select></div>`).join('')}<div style="margin-top:20px;display:flex;gap:12px;justify-content:flex-end;"><button class="danger" onclick="closeModal()">Cancel</button><button onclick="commitPractice()">Save Practice</button></div>`); };
  window.commitPractice = function() { const attendance = {}; document.querySelectorAll('.aPresCheck').forEach(cb => { const pid = cb.dataset.pid; const ratingSelect = document.querySelector(`.aRatingSelect[data-pid="${pid}"]`); attendance[pid] = { present: cb.checked, rating: ratingSelect ? parseInt(ratingSelect.value) : 3 }; }); ld().practices.push({ id:'pr'+Date.now(), date:document.getElementById('prDate').value, duration:parseInt(document.getElementById('prDur').value)||75, focus:document.getElementById('prFocus').value||'General Training', notes:document.getElementById('prNotes')?.value||'', attendance }); renderPage(); closeModal(); };
  function openAddPlayerModal() { if(!isAdmin) return; openModal(`<h3>➕ Add New Player</h3><input id="npName" placeholder="Full Name"><input id="npNum" type="number" placeholder="Jersey Number"><input id="npPos" placeholder="Position"><input id="npInit" placeholder="Initials (2-3 letters)"><div style="margin-top:20px;display:flex;gap:12px;"><button onclick="addPlayer()">Save Player</button><button class="danger" onclick="closeModal()">Cancel</button></div>`); }
  function addPlayer() { const id='p'+Date.now(); ld().players.push({ id, name:document.getElementById('npName').value, number:parseInt(document.getElementById('npNum').value), position:document.getElementById('npPos').value, initials:document.getElementById('npInit').value.toUpperCase() }); ld().playerRatings[id]={ serving:5, passing:5, hitting:5, blocking:5, defense:5, setting:5 }; ld().playerPhysical[id]={ height:175, weight:70, vertical:50 }; renderPage(); closeModal(); }
  function deletePlayer(id) { if(confirm('Delete player?')){ ld().players=ld().players.filter(p=>p.id!==id); delete ld().playerRatings[id]; delete ld().playerPhysical[id]; renderPage(); } }
  function deleteMatch(id) { if(confirm('Delete match?')){ ld().matches=ld().matches.filter(m=>m.id!==id); renderPage(); } }
  function deletePractice(id) { if(confirm('Delete practice session?')){ ld().practices=ld().practices.filter(p=>p.id!==id); renderPage(); } }
  function setMVPModal(mid){ const m=ld().matches.find(x=>x.id===mid); if(!m) return; const players=ld().players.filter(p=>m.performances?.[p.id]?.played); if(players.length===0){ alert('No players participated'); return; } openModal(`<h3>🏆 Select MVP</h3><select id="mvpSelect" style="padding:12px; border-radius:30px;">${players.map(p=>`<option ${m.mvp===p.id?'selected':''} value="${p.id}">${p.name}</option>`).join('')}</select><div style="margin-top:20px;"><button onclick="saveMVP('${mid}')">Save</button><button class="danger" onclick="closeModal()">Cancel</button></div>`); }
  function saveMVP(mid){ const m=ld().matches.find(x=>x.id===mid); if(m){ m.mvp=document.getElementById('mvpSelect').value; renderPage(); closeModal(); } }
  function toggleAdminMode(){ if(!isAdmin){ const pw=prompt('Enter admin password:'); if(pw === '67demon'){ isAdmin=true; document.getElementById('adminToggle').innerHTML='🔓 Admin ON'; renderPage(); } else alert('Wrong password'); } else { isAdmin=false; document.getElementById('adminToggle').innerHTML='🔒 Admin'; renderPage(); } }
  function toggleDarkMode(){ document.body.classList.toggle('dark-mode'); ld().darkMode=document.body.classList.contains('dark-mode'); renderPage(); }
  function toggleMatchExpansion(id){ if(expandedMatches.has(id)) expandedMatches.delete(id); else expandedMatches.add(id); renderPage(); }
  function navigateTo(page){ currentPage=page; if(page==='dashboard') currentPlayerId=null; updateNavButtons(); renderPage(); }
  function updateNavButtons(){ document.querySelectorAll('.nav-btn').forEach(btn=>{ btn.classList.remove('active'); if(btn.dataset.page===currentPage || (currentPage.startsWith('player/') && btn.dataset.page==='players')) btn.classList.add('active'); }); }
  function openModal(html){ document.getElementById('modalBody').innerHTML=html; document.getElementById('genericModal').classList.add('active'); }
  function closeModal(){ document.getElementById('genericModal').classList.remove('active'); }
  window.changeTeamName = () => { if(isAdmin){ let nn=prompt('Team name:', ld().teamName); if(nn){ ld().teamName=nn; updateTeamNameDisplay(); renderPage(); } } };
  document.addEventListener('DOMContentLoaded',()=>{
    document.querySelectorAll('.nav-btn').forEach(btn=>btn.addEventListener('click',function(){ navigateTo(this.dataset.page); }));
    document.getElementById('adminToggle').addEventListener('click',toggleAdminMode);
    document.getElementById('darkModeToggle').addEventListener('click',toggleDarkMode);
    document.getElementById('exportBtn').addEventListener('click',() => exportToJSON());
    document.getElementById('importBtn').addEventListener('click',() => { document.getElementById('fileInput').click(); });
    document.getElementById('fileInput').addEventListener('change',(e) => { if(e.target.files.length) importFromJSON(e.target.files[0]); e.target.value = ''; });
    document.getElementById('genericModal').addEventListener('click',e=>{ if(e.target===e.currentTarget) closeModal(); });
    if(ld().darkMode) document.body.classList.add('dark-mode');
    renderPage();
  });
  window.navigateTo=navigateTo; window.toggleMatchExpansion=toggleMatchExpansion; window.setMVPModal=setMVPModal; window.saveMVP=saveMVP; window.deleteMatch=deleteMatch; window.deletePractice=deletePractice; window.deletePlayer=deletePlayer; window.addPlayer=addPlayer; window.openAddPlayerModal=openAddPlayerModal; window.updateCompare=updateCompare; window.closeModal=closeModal;
})();
</script>
</body>
</html>
